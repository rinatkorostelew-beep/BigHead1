name: Build BigHead APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.2"

      - name: Install Gradle 7.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip
          unzip -q gradle-7.5-bin.zip
          echo "$PWD/gradle-7.5/bin" >> $GITHUB_PATH

      - name: Build APK
        run: gradle :app:assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: BigHead-APK
          path: app/build/outputs/apk/debug/app-debug.apk
